<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Found It.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/logo_glurbus.png">
  <style>
    :root {
      --yellow: #FBBF24;
      --bg: #0a0a0a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }

    /* Scanline glitch overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    .glitch-bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(251,191,36,0.15) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 70%, rgba(255,255,255,0.05) 0%, transparent 60%);
      animation: bgPulse 4s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes bgPulse {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    .content {
      position: relative;
      z-index: 10;
      padding: 2rem;
    }

    .secret-logo {
      width: 180px;
      margin-bottom: 2rem;
      animation: floatLogo 6s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(251,191,36,0.6));
    }

    @keyframes floatLogo {
      0%, 100% { transform: translateY(0px) rotate(-1deg); }
      50%       { transform: translateY(-18px) rotate(1deg); }
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1rem;
      animation: glitchText 6s infinite;
    }

    @keyframes glitchText {
      0%, 90%, 100% {
        text-shadow: none;
        color: #fff;
      }
      91% {
        text-shadow: -3px 0 var(--yellow), 3px 0 #fff;
        color: #fff;
      }
      92% {
        text-shadow: 3px 0 var(--yellow), -3px 0 #fff;
        color: var(--yellow);
      }
      93% {
        text-shadow: none;
        color: #fff;
      }
    }

    .yellow { color: var(--yellow); }

    p.subtitle {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.5);
      max-width: 500px;
      margin: 0 auto 3rem;
      line-height: 1.6;
    }

    .secret-badge {
      display: inline-block;
      border: 1px solid rgba(251,191,36,0.4);
      background: rgba(251,191,36,0.08);
      color: var(--yellow);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.5rem 1.5rem;
      border-radius: 50px;
      margin-bottom: 2rem;
      animation: badgePulse 2s ease-in-out infinite;
    }

    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 rgba(251,191,36,0); }
      50%       { box-shadow: 0 0 20px rgba(251,191,36,0.3); }
    }

    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: rgba(255,255,255,0.3);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.3s;
      letter-spacing: 0.05em;
    }
    .back-link:hover { color: var(--yellow); }

    /* Floating particles */
    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 5; }
    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: var(--yellow);
      border-radius: 50%;
      animation: drift linear infinite;
      opacity: 0;
    }
    @keyframes drift {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) translateX(40px); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="glitch-bg"></div>
  <div class="particles" id="particles"></div>

  <div class="content" style="display:flex; flex-direction:column; align-items:center; justify-content:center;">
    <img src="assets/logo_glurbus.png" alt="Glurbus" class="secret-logo">
    <div class="secret-badge">⚠ Classified</div>
    <h1>You found the <span class="yellow">Wacko Room.</span></h1>
    <p class="subtitle">
      Nobody was supposed to find this. And yet, here you are.<br>
      The Glurbus sees all. The Glurbus knows.
    </p>
    <a href="index.html" class="back-link">← Pretend this never happened</a>
  </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
      container.appendChild(p);
    }
  </script>
</body>
</html>
